<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Nuts — Notificações</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <!-- Header injetado via JS (componente reutilizável) -->
  <div id="header-placeholder"></div>

  <!-- ===== MAIN ===== -->
  <main class="py-4">
    <div class="container">

      <!-- Página label (breadcrumb-style) -->
      <p class="text-secondary small mb-3">Notificações</p>

      <!-- Inbox card -->
      <section class="dashboard-card p-3 p-md-4" aria-label="Caixa de entrada de notificações">

        <!-- Toolbar -->
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3 pb-3 border-bottom">
          <h1 class="dashboard-card__title">
            <i class="bi bi-envelope-open-fill me-2"></i>Caixa de entrada
          </h1>
          <div class="d-flex align-items-center flex-wrap gap-2">
            <button class="btn btn-sm text-secondary text-decoration-none notification-inbox__mark-read" id="btn-marcar-lidas">
              <i class="bi bi-check2"></i> Marcar como lidas
            </button>
            <button class="btn btn-primary-custom btn-sm" id="btn-ativar-lembretes">
              <i class="bi bi-bell"></i> Ativar lembretes
            </button>
            <button class="btn btn-primary-custom btn-sm" id="btn-configurar-notif">
              <i class="bi bi-sliders"></i> Configurar
            </button>
          </div>
        </div>

        <!-- Lista de notificações -->
        <div id="notifications-list"></div>

      </section>

    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript Vanilla -->
  <script src="../js/components.js"></script>
  <script src="../js/notificacoes.js"></script>
</body>
</html>
