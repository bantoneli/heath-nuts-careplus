<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Nuts — Agenda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <main class="py-4">
    <div class="container-fluid px-3 px-xl-4">



      <div class="d-flex flex-column gap-4">

        <div>
          <!-- CARD 1 AGENDAMENTOS -->
          <section class="dashboard-card">

            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
              <h2 class="dashboard-card__title mb-0">
                Selecione o agendamento que deseja alterar
              </h2>

              <span class="badge-pts badge-pts--yellow" id="calendar-appointments-count">
                0 consultas
              </span>
            </div>

            <div class="calendar-appointments-row" id="calendar-appointments-row"></div>

          </section>

          <!-- CARD 2 FILTROS -->
          <section class="dashboard-card">

            <div class="row g-3">

              <div class="col-lg-4">
                <label class="schedule-field-label mb-2 d-block">
                  Especialidade
                </label>

                <select class="form-select calendar-select" id="calendar-specialty-filter">
                  <option value="">Todas especialidades</option>
                </select>
              </div>

              <div class="col-lg-4">
                <label class="schedule-field-label mb-2 d-block">
                  Médico
                </label>

                <select class="form-select calendar-select" id="calendar-doctor-filter">
                  <option value="">Todos médicos</option>
                </select>
              </div>

              <div class="col-lg-4">
                <label class="schedule-field-label mb-2 d-block">
                  Clínica
                </label>

                <select class="form-select calendar-select" id="calendar-clinic-filter">
                  <option value="">Todas clínicas</option>
                </select>
              </div>

            </div>

          </section>
          
        </div>
        <!-- CARD 3 -->
        <section class="dashboard-card p-0 overflow-hidden">

          <div class="calendar-board-wrapper">

            <!-- HEADER -->
            <div class="calendar-top-row">

              <!-- sidebar header -->
              <div class="calendar-top-row__sidebar">
                <label class="schedule-field-label mb-2 d-block">
                  Semana
                </label>
                <select class="form-select calendar-select"id="calendar-week-select"></select>
              </div>

              <!-- datas -->
              <div class="calendar-days-row-wrapper">
                <div class="calendar-days-row"id="calendar-days-row"></div>
              </div>
            </div>

            <!-- BODY COM SCROLL -->
            <div class="calendar-scroll-body" id="calendar-scroll-body">
              
              <!-- SIDEBAR -->
              <div class="calendar-sidebar">
                <div class="calendar-periods">
                  <div class="calendar-periods-buttons d-flex flex-column gap-2 px-3 py-2" id="calendar-periods-buttons">
                    <button class="calendar-period-btn" data-period="manha">Manhã</button>
                    <button class="calendar-period-btn" data-period="tarde">Tarde </button>
                    <button class="calendar-period-btn" data-period="noite">Noite</button>
                    <div class="calendar-slots-legend">
                      <div class="calendar-slots-legend__item">
                        <span class="calendar-slots-legend__dot calendar-slots-legend__dot--available"></span>
                        Disponível
                      </div>
                      <div class="calendar-slots-legend__item">
                        <span class="calendar-slots-legend__dot calendar-slots-legend__dot--occupied"></span>
                        Ocupado
                      </div>
                      <div class="calendar-slots-legend__item">
                        <span class="calendar-slots-legend__dot calendar-slots-legend__dot--user"></span>
                        Minha consulta
                      </div>
                      <div class="calendar-slots-legend__item">
                        <span class="calendar-slots-legend__dot calendar-slots-legend__dot--blocked"></span>
                        Bloqueado
                      </div>
                    </div>
                  </div>

                  <div class="calendar-time-column" id="calendar-time-column"></div>
                </div>
              </div>

              <!-- GRID -->
              <div class="calendar-grid">
                <div class="calendar-columns" id="calendar-columns"></div>
              </div>
            </div>
            
          </div>
        </section>

      </div>

    </div>
  </main>

  <!-- Mostra opções de medicos em reagendamento com multiplos medicos -->
  <div id="calendar-doctor-picker"></div>

  <!-- Modal de confirmação de reagendamento -->
  <div id="calendar-reschedule-modal" class="calendar-reschedule-modal">
    <div class="calendar-reschedule-modal__content">
      <div class="calendar-reschedule-modal__title">
        Reagendar consulta
      </div>
      <div id="calendar-reschedule-modal-body"></div>
      <div class="calendar-reschedule-modal__actions">
        <button id="calendar-reschedule-cancel" class="btn btn-secondary">
          Cancelar
        </button>
        <button id="calendar-reschedule-confirm" class="btn btn-primary">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../mocks/data/mock-data.js"></script>
  <script src="../mocks/behaviors/mock-behaviors.js"></script>

  <script src="../js/components.js"></script>
  <script src="../js/functions.js"></script>
  <script src="../js/calendar.js"></script>

</body>
</html>
