<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Nuts — Agenda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <main class="py-4">
    <div class="container-fluid px-3 px-xl-4">

      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
        <div>
          <p class="text-secondary small mb-1">Agenda Inteligente</p>
          <h1 class="dashboard-card__title fs-4 mb-0">Calendário de Consultas</h1>
        </div>

        <a href="agendamento.html" class="btn btn-primary-custom">
          <i class="bi bi-plus-circle"></i>
          Novo agendamento
        </a>
      </div>

      <div class="d-flex flex-column gap-4">

        <!-- CARD 1 -->
        <section class="dashboard-card">

          <div class="row g-3">

            <div class="col-lg-4">
              <label class="schedule-field-label mb-2 d-block">
                Especialidade
              </label>

              <select class="form-select calendar-select" id="calendar-specialty-filter">
                <option value="">Todas especialidades</option>
              </select>
            </div>

            <div class="col-lg-4">
              <label class="schedule-field-label mb-2 d-block">
                Médico
              </label>

              <select class="form-select calendar-select" id="calendar-doctor-filter">
                <option value="">Todos médicos</option>
              </select>
            </div>

            <div class="col-lg-4">
              <label class="schedule-field-label mb-2 d-block">
                Clínica
              </label>

              <select class="form-select calendar-select" id="calendar-clinic-filter">
                <option value="">Todas clínicas</option>
              </select>
            </div>

          </div>

        </section>

        <!-- CARD 2 -->
        <section class="dashboard-card">

          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h2 class="dashboard-card__title mb-0">
              Próximos agendamentos
            </h2>

            <span class="badge-pts badge-pts--yellow" id="calendar-appointments-count">
              0 consultas
            </span>
          </div>

          <div class="calendar-appointments-row" id="calendar-appointments-row"></div>

        </section>

        <!-- CARD 3 -->
        <section class="dashboard-card p-0 overflow-hidden">

          <div class="calendar-board-wrapper">

            <!-- Sidebar -->
            <div class="calendar-sidebar">

              <div class="calendar-sidebar__header">
                <label class="schedule-field-label mb-2 d-block">
                  Semana
                </label>

                <select class="form-select calendar-select" id="calendar-week-select"></select>
              </div>

              <div class="calendar-periods">
                <button class="calendar-period-btn" data-period="manha">
                  Manhã
                </button>

                <button class="calendar-period-btn" data-period="tarde">
                  Tarde
                </button>

                <button class="calendar-period-btn" data-period="noite">
                  Noite
                </button>
              </div>

              <div class="calendar-time-column" id="calendar-time-column"></div>

            </div>

            <!-- Grid -->
            <div class="calendar-grid-scroll" id="calendar-grid-scroll">

              <div class="calendar-grid" id="calendar-grid">

                <div class="calendar-days-row" id="calendar-days-row"></div>

                <div class="calendar-columns" id="calendar-columns"></div>

              </div>

            </div>

          </div>

        </section>

      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../mocks/data/mock-data.js"></script>
  <script src="../mocks/behaviors/mock-behaviors.js"></script>

  <script src="../js/components.js"></script>
  <script src="../js/functions.js"></script>
  <script src="../js/calendar.js"></script>

</body>
</html>
