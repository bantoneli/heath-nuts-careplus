<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Nuts — Rankings</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <main class="py-4">
    <div class="container">

      <!-- Filtros de especialidade e tipo -->
      <section aria-label="Filtros do ranking">
        <div class="dashboard-card mb-3">
          <p class="ranking-filters__label mb-2">Selecione o Ranking que deseja ver</p>
          <div class="ranking-filters">
            <div id="specialties-filters"></div>
            <div class="d-flex gap-2 ms-lg-auto flex-shrink-0 flex-wrap">
              <div class="specialties-filters__toggle">
                <button class="specialties-filters__toggle-btn specialties-filters__toggle-btn--active" data-ranking-type="Geral">Geral</button>
                <button class="specialties-filters__toggle-btn" data-ranking-type="Equipe">Equipe</button>
              </div>
              <div class="specialties-filters__toggle">
                <button class="specialties-filters__toggle-btn specialties-filters__toggle-btn--active" data-scope-type="Associados">Associados</button>
                <button class="specialties-filters__toggle-btn" data-scope-type="Empresas">Empresas</button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- Desempenho + Top 3 -->
      <div class="row g-4 mb-4">

        <!-- Seu desempenho -->
        <div class="col-lg-5">
          <section class="dashboard-card h-100" aria-label="Seu desempenho">
            <h2 class="dashboard-card__title mb-3">Seu desempenho</h2>
            <div class="row g-2 mb-3" id="performance-stats">
              <div class="col-4">
                <div class="stat-box">
                  <span class="stat-box__label">Sua posição</span>
                  <span class="stat-box__value" id="perf-position">167º</span>
                </div>
              </div>
              <div class="col-4">
                <div class="stat-box">
                  <span class="stat-box__label">Pontuação atual</span>
                  <span class="stat-box__value" id="perf-points">1.250 pts</span>
                </div>
              </div>
              <div class="col-4">
                <div class="stat-box">
                  <span class="stat-box__label">Próxima conquista</span>
                  <span class="stat-box__value" id="perf-next">Faltam 150 pts</span>
                </div>
              </div>
            </div>
            <p class="priority-msg mb-0">
              <span class="priority-msg__dot"></span>
              <span id="perf-monthly"></span>
            </p>
          </section>
        </div>

        <!-- Top 3 do ranking -->
        <div class="col-lg-7">
          <section class="dashboard-card h-100" aria-label="Os melhores do ranking">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h2 class="dashboard-card__title">Os melhores do ranking</h2>
                <span class="points-history__subtitle" id="ranking-updated">Atualizado hoje, 08:00</span>
              </div>
            </div>
            <div id="ranking-podium" class="ranking-podium">
              <div class="ranking-podium__item ranking-podium__item--gold">
                <span class="ranking-podium__avatar"><i></i></span>
                <span class="ranking-podium__name"></span>
                <span class="ranking-podium__pts"></span>
              </div>
              <div class="ranking-podium__item ranking-podium__item--silver">
                <span class="ranking-podium__avatar"><i></i></span>
                <span class="ranking-podium__name"></span>
                <span class="ranking-podium__pts"></span>
              </div>
              <div class="ranking-podium__item ranking-podium__item--bronze">
                <span class="ranking-podium__avatar"><i></i></span>
                <span class="ranking-podium__name"></span>
                <span class="ranking-podium__pts"></span>
              </div>
            </div>
          </section>
        </div>
      </div>

      <!-- Ranking Geral -->
      <section class="dashboard-card mb-4" aria-label="Ranking geral">
        <h2 class="dashboard-card__title mb-3 ranking-title">Ranking Geral</h2>
        <div class="d-flex gap-2 align-items-center mb-3">
          <div class="ranking-search flex-grow-1">
            <i class="bi bi-search ranking-search__icon"></i>
            <input type="text" class="ranking-search__input" id="ranking-search-input" placeholder="Buscar colegas" aria-label="Buscar colegas">
          </div>
        </div>
        <div id="ranking-list"></div>
      </section>


      <!-- Historico de pontos -->
      <section class="dashboard-card mb-4" id = "points-history" aria-label="Histórico de pontos">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="dashboard-card__title">Histórico de pontos</h2>
          <button class="btn btn-accent" id="btn-ranking-filters" aria-label="Filtros">
            <i class="bi bi-funnel-fill"></i> Filtros
          </button>
        </div>
        <div id="actions-list"></div>
      </section>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Mocks -->
  <script src="../mocks/data/mock-data.js"></script>
  <script src="../mocks/behaviors/mock-behaviors.js"></script>

  <!-- JavaScript -->
  <script src="../js/components.js"></script>
  <script src="../js/rankings.js"></script>
  <script src="../js/functions.js"></script>

</body>
</html>
